<body>
  <header>
    <div class="header-inner">
      <h1>研究室の仕事</h1>
      <p class="subtitle">ごみ捨て・当番・日常ルール</p>
    </div>
  </header>
  <div class="subpage">
    <a href="index.html" class="back-link">&larr; ホームに戻る</a>

    <section>
      <h2>ごみ捨てルール</h2>
      <h3>日程</h3>
      <ul>
        <li>月曜と木曜の <strong>12:00〜12:30</strong> の間</li>
        <li>ゴミが溜まってきたら行く</li>
        <li>ゼミのペアでローテーションする</li>
      </ul>
      <h3>手順</h3>
      <ol>
        <li>燃えるゴミ袋は上を縛る</li>
        <li>所定の場所から袋を1枚取り出す</li>
        <li>その袋にマジックで「<strong>安藤研</strong>」と書く</li>
        <li>ペットボトルを潰して袋に入れる。缶は別の場所に入れる</li>
        <li>2つの袋をゴミ捨て場に持っていく</li>
        <li>ペットボトル用の袋は持ち帰ってゴミ箱にセットする</li>
        <li>ローテーションを更新する</li>
      </ol>
    </section>
  </div>
  <footer><p>安藤研究室 新人ガイド</p></footer>
